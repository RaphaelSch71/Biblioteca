name: Bug report
description: Report a reproducible problem in the application
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide clear, numbered steps.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: e.g., 1.0.0

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Windows 11

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.9

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste relevant logs or traceback output.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots if applicable.
